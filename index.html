<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma AI</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Markdown & Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/html.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/css.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="newChatBtn" class="primary-btn wide-btn">
                    <i data-lucide="plus"></i>
                    <span>New Chat</span>
                </button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Recent Chats</div>
                <ul id="chatList" class="chat-list">
                    <!-- Chat sessions will be injected here -->
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="clearAllBtn" class="ghost-btn">
                    <i data-lucide="trash-2"></i>
                    <span>Clear All</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <header class="app-header">
                <div class="header-left">
                    <button id="sidebarToggle" class="icon-btn" title="Toggle Sidebar">
                        <i data-lucide="menu"></i>
                    </button>
                    <div class="header-title-container">
                        <h1 id="currentSessionTitle" class="gradient-text">Gemma AI</h1>
                        <span class="badge">Pro</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="icon-btn" title="Settings">
                        <i data-lucide="settings"></i>
                    </button>
                    <div class="user-profile-sm">
                        <span>U</span>
                    </div>
                </div>
            </header>

            <main id="chatHistory" class="chat-history">
                <div class="welcome-screen">
                    <div class="bot-avatar-large shadow-pulse">
                        <i data-lucide="sparkles"></i>
                    </div>
                    <h2>How can I help you today?</h2>
                    <p>Experience smoother responses, better code rendering, and modern UI.</p>
                </div>
            </main>

            <!-- Scroll to Bottom Button -->
            <button id="scrollFab" class="fab hidden" title="Scroll to Bottom">
                <i data-lucide="arrow-down"></i>
            </button>

            <footer class="input-area">
                <div class="input-container">
                    <div class="input-pill">
                        <textarea id="prompt" rows="1" placeholder="Ask Gemma anything..." autocomplete="off"></textarea>
                        <div class="input-actions">
                            <button id="sendBtn" class="send-btn" disabled>
                                <i data-lucide="arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="input-info">
                    Gemma AI can make mistakes. Consider verifying important information.
                </div>
            </footer>
        </div>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <script type="module" src="main.js"></script>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
      });
    </script>
</body>
</html>
